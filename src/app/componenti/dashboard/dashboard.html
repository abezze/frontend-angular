<mat-toolbar>
  <button matIconButton  [matMenuTriggerFor]="menu" class="example-icon" aria-label="Example icon-button with menu icon">
    <mat-icon>menu</mat-icon>
  </button>
  <mat-menu #menu="matMenu">
    <button mat-menu-item (click)="changePWD()">
      <mat-icon>password</mat-icon>
      <span>Cambio password</span>
    </button>
    <button mat-menu-item (click)="profilo()">
      <mat-icon>person</mat-icon>
      <span>Profile</span>
    </button>
  </mat-menu>
  <span>Bike Shop</span>
  <span class="example-spacer"></span>

 @if (auth.grant().userId) {

    <div class="user-info">
      <span class="welcome">Ciao {{ auth.grant().userId }}</span>
    </div>
  }
    <span class="example-spacer"></span>

    <button mat-icon-button
        class="example-icon" aria-label="Home page" matTooltip="Home Page"
        [routerLink]="['/dash','home']">

  <mat-icon>home</mat-icon>
</button>

@if (auth.grant().isLogged){
    <div class="icon-with-label"
        matTooltip="Gestione del Carrello"
        [routerLink]="['/dash','cart']">



    <button mat-icon-button aria-label="Carrello" matBadge="5" >
      <img src="cart.svg" class="menu-icon-img" />
    </button>
    </div>
  <button matIconButton class="example-icon" aria-label="uscire dell'applicazione"
    matTooltip="Uscire dell'applicazione"
    (click)="logout()">
    <mat-icon>logout</mat-icon>
  </button>
  } @else {
   <button matIconButton class="example-icon"
    matTooltip="credenziali per l'applicazione"
    (click)="login()">
    <mat-icon>login</mat-icon>
  </button>
}
</mat-toolbar>
<mat-drawer-container class="example-container">
    <mat-drawer mode="side" [opened]=auth.isRoleAdmin() class="side-menu">
        <mat-list role="list">
            <mat-list-item role="listitem" routerLink="/dash/home" [routerLinkActive]="'active'">Home</mat-list-item>
        @if (auth.grant().isAdmin){
          <mat-list-item role="listitem" routerLink="/dash/user" [routerLinkActive]="'active'">Gestione utente</mat-list-item>
          <mat-list-item role="listitem" routerLink="/dash/bike" [routerLinkActive]="'active'">Gestione Biciclette</mat-list-item>
          <mat-list-item role="listitem" routerLink="/dash/produttori" [routerLinkActive]="'active'">Gestione Produttori</mat-list-item>
        }
        </mat-list>
    </mat-drawer>
    <mat-drawer-content>
        <router-outlet></router-outlet>
    </mat-drawer-content>
</mat-drawer-container>
