<mat-dialog-content class="dialog-container">
    <button mat-icon-button mat-dialog-close class="dialog-close-btn">
        <mat-icon>close</mat-icon>
    </button>

    <mat-card>
        <mat-card-header class="header-center">
            <mat-card-title>Immagine</mat-card-title>
        </mat-card-header>
        <mat-card-content  style="display: flex; justify-content: center; align-items: center;">
            <img [src]="image" alt="Uploaded" style="max-width: 800px; max-height: 500px; border-radius: 4px;">
        </mat-card-content>
    </mat-card>
</mat-dialog-content>
